networks:
  awg-net:
    driver: bridge
    internal: false

services:
  awg-jump:
    image: ${AWG_JUMP_IMAGE:?set AWG_JUMP_IMAGE in .env.images}
    pull_policy: always
    container_name: awg-jump
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ./data:/data
    networks:
      - awg-net
    ports:
      - "${AWG0_LISTEN_PORT:-51820}:${AWG0_LISTEN_PORT:-51820}/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${WEB_PORT:-8080}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: ${AWG_NGINX_IMAGE:?set AWG_NGINX_IMAGE in .env.images}
    pull_policy: always
    container_name: awg-nginx
    restart: unless-stopped
    depends_on:
      awg-jump:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ./data/certs:/etc/nginx/certs
    networks:
      - awg-net
    ports:
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_HTTP_PORT:-80}:80"
