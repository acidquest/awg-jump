services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - /opt/awg-jump/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/awg-jump/data/certs:/etc/nginx/certs:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - awg-jump
    networks:
      - awg-net
