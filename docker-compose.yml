networks:
  awg-net:
    driver: bridge
    internal: false

volumes:
  awg-data:

services:
  # ── Основной jump-сервер ────────────────────────────────────────────────
  awg-jump:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: awg-jump
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ./data:/data
      - ${ENV_FILE:-.env}:/app/.env
    networks:
      - awg-net
    ports:
      - "${AWG0_LISTEN_PORT:-51820}:${AWG0_LISTEN_PORT:-51820}/udp"
      - "${WG0_LISTEN_PORT:-51821}:${WG0_LISTEN_PORT:-51821}/udp"
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}/tcp"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/venv/bin/python -c \"from backend.config import reload_settings, settings; import subprocess; reload_settings(); url=f'{settings.web_mode.lower()}://localhost:{settings.web_port}/api/health'; cmd=['curl','-f']; cmd.insert(1,'-k') if settings.web_mode.lower()=='https' else None; cmd.append(url); raise SystemExit(subprocess.call(cmd))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Локальная тестовая upstream нода (опционально) ──────────────────────
  awg-node:
    build:
      context: ./node
      dockerfile: Dockerfile
    container_name: awg-node-test
    restart: unless-stopped
    profiles:
      - node
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      AWG_LISTEN_PORT: ${NODE_AWG_PORT:-51821}
      AWG_PRIVATE_KEY: ${NODE_TEST_PRIVATE_KEY:-}
      AWG_ADDRESS: ${NODE_TEST_ADDRESS:-10.20.0.3/32}
      AWG_PEER_PUBLIC_KEY: ${AWG1_PUBLIC_KEY:-}
      AWG_PEER_ALLOWED_IPS: ${AWG1_ADDRESS:-10.20.0.2/32}
    networks:
      - awg-net
    ports:
      - "${NODE_AWG_PORT:-51821}:${NODE_AWG_PORT:-51821}/udp"
