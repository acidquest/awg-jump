[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
logfile_backups=0
loglevel=info
pidfile=/var/run/supervisord.pid
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:uvicorn]
command=/opt/venv/bin/python /app/scripts/run_uvicorn.py
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stdout_logfile_backups=0
environment=PYTHONPATH="/app",PYTHONUNBUFFERED="1"

[program:telemt]
command=/usr/local/bin/telemt /data/telemt/telemt.toml
directory=/data/telemt
autostart=false
autorestart=true
startretries=5
startsecs=5
stopsignal=TERM
stopasgroup=true
killasgroup=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stdout_logfile_backups=0
environment=RUST_LOG="info"
